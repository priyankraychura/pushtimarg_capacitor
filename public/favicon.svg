<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Lotus Flower Favicon for Pushtimarg -->
  <defs>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#C44569"/>
    </linearGradient>
    <linearGradient id="innerPetalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB8D0"/>
      <stop offset="100%" stop-color="#FF6B9D"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>
  
  <!-- Outer petals -->
  <ellipse cx="32" cy="24" rx="7" ry="16" fill="url(#petalGrad)" transform="rotate(-45 32 32)" opacity="0.9"/>
  <ellipse cx="32" cy="24" rx="7" ry="16" fill="url(#petalGrad)" transform="rotate(-15 32 32)" opacity="0.9"/>
  <ellipse cx="32" cy="24" rx="7" ry="16" fill="url(#petalGrad)" transform="rotate(15 32 32)" opacity="0.9"/>
  <ellipse cx="32" cy="24" rx="7" ry="16" fill="url(#petalGrad)" transform="rotate(45 32 32)" opacity="0.9"/>
  
  <!-- Side petals -->
  <ellipse cx="32" cy="26" rx="6" ry="14" fill="url(#petalGrad)" transform="rotate(-70 32 32)" opacity="0.8"/>
  <ellipse cx="32" cy="26" rx="6" ry="14" fill="url(#petalGrad)" transform="rotate(70 32 32)" opacity="0.8"/>
  
  <!-- Inner petals -->
  <ellipse cx="32" cy="26" rx="5" ry="12" fill="url(#innerPetalGrad)" transform="rotate(-30 32 32)"/>
  <ellipse cx="32" cy="26" rx="5" ry="12" fill="url(#innerPetalGrad)" transform="rotate(0 32 32)"/>
  <ellipse cx="32" cy="26" rx="5" ry="12" fill="url(#innerPetalGrad)" transform="rotate(30 32 32)"/>
  
  <!-- Center -->
  <circle cx="32" cy="30" r="5" fill="url(#centerGrad)"/>
  <circle cx="31" cy="29" r="1.5" fill="#FFE44D" opacity="0.8"/>
</svg>